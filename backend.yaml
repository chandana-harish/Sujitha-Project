apiVersion: apps/v1 
kind: StatefulSet 
metadata:
  name: backend-deployment 
  namespace: suji 
spec:
  replicas: 1
  minReadySeconds: 10
  selector:
    matchLabels:
      apps: sujithas 
  template:
    metadata:
      apps: sujithas 
    spec:
      terminationGracePeriodSecond: 10
      containers:
        - name: backend-cont 
          image: mongo 
          ports:
            - containerPort: 27017 
          resources:
            requests:
              cpu: "100m"
              memory: "200Mi"
            limits:
              cpu: "200m"
              memory: "500Mi"
          env:
            - name: MONGO_URI 
              valueFrom: 
                secretKeyRef:
                  name: suji-secret 
                  key: MONGO_URI 
            - name: PORT
              valueFrom: 
                secretKeyRef:
                  name: suji-secret 
                  key: PORT
              